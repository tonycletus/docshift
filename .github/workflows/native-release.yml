name: Native Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cli:
    name: Build CLI package
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - name: Verify CLI version tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/cli
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [ "v$package_version" != "${{ github.ref_name }}" ]; then
            echo "Tag ${{ github.ref_name }} does not match CLI package version v$package_version"
            exit 1
          fi
      - run: npm run build:cli
      - name: Publish CLI to npm
        if: env.NODE_AUTH_TOKEN != '' && startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/cli
        run: |
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "$package_name@$package_version is already published; skipping npm publish."
            exit 0
          fi
          npm publish --access public
      - name: Stage CLI assets
        run: |
          mkdir -p release
          cp release/cli/*.tgz release/
          cp install/install.sh release/install.sh
          cp install/install.ps1 release/install.ps1
          chmod +x release/install.sh
          (cd release && find . -maxdepth 1 -type f ! -name checksums.txt -exec sha256sum {} + > checksums.txt)
      - uses: actions/upload-artifact@v4
        with:
          name: cli-assets
          path: release/*

  desktop:
    name: Build desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: DocShiftSetup.exe
            tags: ""
          - os: macos-15
            asset: DocShift-macos-arm64.dmg
            tags: ""
          - os: ubuntu-latest
            asset: docshift-linux-amd64.deb
            tags: webkit2_41
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev nsis
      - name: Windows installer dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisPath = "${env:ProgramFiles(x86)}\NSIS"
          if (Test-Path $nsisPath) {
            Add-Content $env:GITHUB_PATH $nsisPath
          }
      - run: npm ci --legacy-peer-deps
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build desktop assets
        run: npm run build:desktop
      - name: Build Windows installer
        if: runner.os == 'Windows'
        working-directory: native/desktop
        run: wails build -clean -nsis
      - name: Build Wails app
        if: runner.os != 'Windows'
        working-directory: native/desktop
        run: wails build -clean ${{ matrix.tags && format('-tags {0}', matrix.tags) || '' }}
      - name: Stage desktop artifact
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ runner.os }}" = "macOS" ]; then
            hdiutil create \
              -volname DocShift \
              -srcfolder native/desktop/build/bin/DocShift.app \
              -ov \
              -format UDZO \
              "release/${{ matrix.asset }}"
            exit 0
          fi
          if [ "${{ runner.os }}" = "Linux" ]; then
            package_dir="release/deb"
            mkdir -p "$package_dir/DEBIAN" "$package_dir/usr/bin" "$package_dir/usr/share/applications"
            cp native/desktop/build/bin/DocShift "$package_dir/usr/bin/docshift-desktop"
            chmod 755 "$package_dir/usr/bin/docshift-desktop"
            cat > "$package_dir/DEBIAN/control" <<'CONTROL'
          Package: docshift
          Version: 1.1.2
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Tony Cletus
          Description: Free, private, open-source PDF tools.
          CONTROL
            cat > "$package_dir/usr/share/applications/docshift.desktop" <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=DocShift
          Exec=/usr/bin/docshift-desktop
          Categories=Office;Utility;
          DESKTOP
            dpkg-deb --build "$package_dir" "release/${{ matrix.asset }}"
            exit 0
          fi
          if [ "${{ runner.os }}" = "Windows" ]; then
            found="$(find native/desktop/build -type f \( -iname '*installer*.exe' -o -iname '*setup*.exe' \) | head -n 1)"
            if [ -z "$found" ]; then
              echo "No Windows installer artifact found. Refusing to upload the raw app executable as DocShiftSetup.exe."
              find native/desktop/build -type f || true
              exit 1
            fi
            cp "$found" "release/${{ matrix.asset }}"
            exit 0
          fi
          found="$(find native/desktop/build -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.deb' \) | head -n 1)"
          if [ -z "$found" ]; then
            echo "No desktop artifact found"
            find native/desktop/build -type f || true
            exit 1
          fi
          cp "$found" "release/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: release/*

  publish:
    name: Publish GitHub Release
    needs: [cli, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
